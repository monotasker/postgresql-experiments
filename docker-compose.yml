services:
  db:
    container_name: learning-postgres-db
    build:
      context: ./docker/db
    image: learning-postgres:14-partman-cron
    restart: "unless-stopped"
    ports:
      - "5434:5432"
    env_file:
      - ./.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: ${POSTGRES_DB:?set in .env}
    # pg_cron must be in shared_preload_libraries (server-wide) and pinned
    # to a single database where its bookkeeping tables live.
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_cron"
      - "-c"
      - "cron.database_name=${POSTGRES_DB:?set in .env}"
    volumes:
      - database_data:/var/lib/postgresql/data
  pgadmin:
    container_name: learning-postgres-pgadmin
    image: dpage/pgadmin4:6
    restart: "unless-stopped"
    ports:
      - "5054:80"
    env_file:
      - ./.env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:?set in .env}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:?set in .env}
    volumes:
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json
      - pgadmin_data:/var/lib/pgadmin
volumes:
  database_data:
  pgadmin_data:
